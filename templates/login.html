<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login / Register - Telugu Beats</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f0f12; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #18181e; padding: 35px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); width: 340px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
        h2 { color: #1DB954; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #22222a; color: #fff; box-sizing: border-box; outline: none; }
        input:focus { border-color: #1DB954; }
        button { width: 100%; padding: 12px; background: #1DB954; color: #000; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .register-btn { background: #2a2a35; color: #fff; }
        .msg { color: #ff4d4d; font-size: 0.85rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🎵 Telugu Beats</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <p class="msg">{{ messages[0] }}</p>
          {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>

        <p style="margin-top: 20px; color: #888; font-size: 0.85rem;">New User? Create Account:</p>
        <form method="POST" action="/register">
            <input type="text" name="username" placeholder="New Username" required>
            <input type="password" name="password" placeholder="New Password" required>
            <button type="submit" class="register-btn">Register</button>
        </form>
    </div>
</body>
</html>
