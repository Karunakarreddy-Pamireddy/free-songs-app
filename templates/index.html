<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Telugu Free Songs & Full Lyrics</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; }
        h1 { color: #1ed760; margin: 0; }
        .logout { color: #ff5555; text-decoration: none; font-weight: bold; margin-left: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 25px; }
        .song-card { background: #181818; padding: 18px; border-radius: 12px; border: 1px solid #282828; display: flex; flex-direction: column; justify-content: space-between; }
        .song-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
        .song-card h3 { margin: 12px 0 4px 0; color: #fff; }
        .song-card p { color: #b3b3b3; margin: 0 0 12px 0; font-size: 0.9em; }
        audio { width: 100%; margin-bottom: 15px; }
        .lyrics-box { background: #222; padding: 12px; border-radius: 8px; font-size: 0.9em; color: #e0e0e0; white-space: pre-line; line-height: 1.5; border-left: 3px solid #1ed760; }
        .lyrics-title { font-weight: bold; color: #1ed760; margin-bottom: 6px; display: block; }
    </style>
</head>
<body>
    <header>
        <h1>🎵 Telugu Hit Songs & Lyrics</h1>
        <div>
            <span>Welcome, <strong>{{ user }}</strong>!</span> | 
            <a href="/logout" class="logout">Logout</a>
        </div>
    </header>

    <div class="grid">
        {% for song in songs %}
        <div class="song-card">
            <div>
                <img src="{{ song.cover }}" alt="Cover">
                <h3>{{ song.title }}</h3>
                <p>{{ song.movie }} • {{ song.artist }}</p>
                <audio controls>
                    <source src="{{ song.url }}" type="audio/mpeg">
                    Your browser does not support audio element.
                </audio>
            </div>
            <div class="lyrics-box">
                <span class="lyrics-title">📜 Full Song Lyrics:</span>
                {{ song.lyrics }}
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
