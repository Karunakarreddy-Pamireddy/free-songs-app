<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Telugu Free Songs & Lyrics</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        h1 { color: #1ed760; }
        .logout { color: #ff5555; text-decoration: none; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .song-card { background: #181818; padding: 15px; border-radius: 10px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; }
        .song-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
        .song-card h3 { margin: 10px 0 5px 0; color: #fff; }
        .song-card p { color: #aaa; margin: 0 0 10px 0; font-size: 0.9em; }
        audio { width: 100%; margin-bottom: 10px; }
        .lyrics-box { background: #242424; padding: 10px; border-radius: 6px; font-size: 0.85em; color: #ddd; white-space: pre-line; text-align: left; max-height: 120px; overflow-y: auto; }
    </style>
</head>
<body>
    <header>
        <h1>🎵 Telugu Songs & Full Lyrics</h1>
        <div>
            <span>Welcome, <strong>{{ user }}</strong>!</span> | 
            <a href="/logout" class="logout">Logout</a>
        </div>
    </header>

    <div class="grid">
        {% for song in songs %}
        <div class="song-card">
            <div>
                <img src="{{ song.cover }}" alt="Cover">
                <h3>{{ song.title }}</h3>
                <p>{{ song.movie }} • {{ song.artist }}</p>
                <audio controls>
                    <source src="{{ song.url }}" type="audio/mpeg">
                </audio>
            </div>
            <div class="lyrics-box">
                <strong>📜 Lyrics:</strong><br>
                {{ song.lyrics }}
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
